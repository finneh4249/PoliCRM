<!-- User Management Modal -->
<div id="userModal" class="fixed inset-0 z-50 hidden" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm transition-opacity"></div>

    <div class="fixed inset-0 z-10 overflow-y-auto">
        <div class="flex min-h-full items-end justify-center p-4 text-center sm:items-center sm:p-0">
            <div
                class="relative transform overflow-hidden rounded-xl bg-white text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-4xl">

                <!-- Header -->
                <div class="bg-slate-50 px-4 py-3 sm:px-6 border-b border-slate-200 flex justify-between items-center">
                    <h3 class="text-lg font-semibold leading-6 text-slate-900" id="modal-title">User Management</h3>
                    <button onclick="closeUserModal()" class="text-slate-400 hover:text-slate-500 transition-colors">
                        <span class="sr-only">Close</span>
                        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                        </svg>
                    </button>
                </div>

                <div class="px-4 py-5 sm:p-6">
                    <!-- Add User Form -->
                    <div class="mb-8 bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <h4 class="text-sm font-bold text-slate-700 uppercase tracking-wide mb-3">Add New User</h4>
                        <form id="createUserForm" class="flex flex-col sm:flex-row gap-4 items-end">
                            <div class="flex-grow">
                                <label for="newUserEmail" class="block text-xs font-medium text-slate-500 mb-1">Email
                                    Address</label>
                                <input type="email" id="newUserEmail" required
                                    class="block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border"
                                    placeholder="user@example.com">
                            </div>
                            <div class="w-full sm:w-48">
                                <label for="newUserRole"
                                    class="block text-xs font-medium text-slate-500 mb-1">Role</label>
                                <select id="newUserRole"
                                    class="block w-full rounded-md border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm px-3 py-2 border bg-white">
                                    <option value="user">User</option>
                                    <option value="admin">Admin</option>
                                </select>
                            </div>
                            <button type="submit"
                                class="inline-flex justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 w-full sm:w-auto">
                                + Add User
                            </button>
                        </form>
                    </div>

                    <!-- Users Table -->
                    <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 sm:rounded-lg">
                        <table class="min-w-full divide-y divide-slate-300">
                            <thead class="bg-slate-50">
                                <tr>
                                    <th scope="col"
                                        class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-slate-900 sm:pl-6">
                                        Email</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-slate-900">
                                        Role</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-slate-900">
                                        Status</th>
                                    <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6">
                                        <span class="sr-only">Actions</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-200 bg-white" id="usersTableBody">
                                <!-- Users will be populated here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
