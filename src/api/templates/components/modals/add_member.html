<div id="addMemberModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full animate-fade-in">
        <div class="gradient-bg text-white px-6 py-4 flex justify-between items-center rounded-t-2xl">
            <h2 class="text-xl font-bold">➕ Add New Member</h2>
            <button onclick="document.getElementById('addMemberModal').classList.add('hidden')"
                class="text-white/80 hover:text-white text-2xl leading-none">&times;</button>
        </div>

        <form id="addMemberForm" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">First Name
                        *</label>
                    <input type="text" name="first_name" placeholder="John"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        required>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">Last Name
                        *</label>
                    <input type="text" name="last_name" placeholder="Smith"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        required>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">Middle
                    Name</label>
                <input type="text" name="middle_name" placeholder="Optional"
                    class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">NationBuilder ID
                    *</label>
                <input type="number" name="nationbuilder_id" placeholder="12345"
                    class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    required>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">Street Address
                    *</label>
                <input type="text" name="primary_address1" placeholder="123 Main St"
                    class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    required>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">Suburb
                        *</label>
                    <input type="text" name="primary_city" placeholder="Melbourne"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        required>
                </div>
                <div>
                    <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">State
                        *</label>
                    <select name="primary_state"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                        required>
                        <option value="">Select...</option>
                        <option value="NSW">NSW</option>
                        <option value="VIC">VIC</option>
                        <option value="QLD">QLD</option>
                        <option value="WA">WA</option>
                        <option value="SA">SA</option>
                        <option value="TAS">TAS</option>
                        <option value="ACT">ACT</option>
                        <option value="NT">NT</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="text-xs font-semibold text-slate-600 uppercase tracking-wide mb-1 block">Postcode
                    *</label>
                <input type="text" name="primary_zip" placeholder="3000" pattern="[0-9]{4}"
                    class="w-full border border-slate-300 rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-indigo-500 focus:border-transparent"
                    required>
            </div>

            <div class="flex justify-end gap-3 pt-4 border-t border-slate-200">
                <button type="button" onclick="document.getElementById('addMemberModal').classList.add('hidden')"
                    class="px-5 py-2.5 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors font-medium">Cancel</button>
                <button type="submit"
                    class="px-5 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors font-medium">
                    Save Member
                </button>
            </div>
        </form>
    </div>
</div>
