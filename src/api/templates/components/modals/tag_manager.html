<div id="tagModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[80vh] overflow-y-auto animate-fade-in">
        <div class="gradient-bg text-white px-6 py-4 flex justify-between items-center rounded-t-2xl">
            <h2 class="text-xl font-bold">🏷️ Manage Tags</h2>
            <button onclick="document.getElementById('tagModal').classList.add('hidden')"
                class="text-white/80 hover:text-white text-2xl leading-none">&times;</button>
        </div>

        <div class="p-6">
            <div class="mb-6">
                <h3 class="text-sm font-bold text-slate-700 mb-3">Create New Tag</h3>
                <form id="createTagForm" class="space-y-3">
                    <div class="flex gap-3">
                        <input type="text" name="tag_name" placeholder="Tag name" required
                            class="flex-grow border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                        <input type="color" name="tag_color" value="#3B82F6"
                            class="w-16 h-10 border border-slate-300 rounded-lg cursor-pointer">
                    </div>
                    <input type="text" name="tag_description" placeholder="Description (optional)"
                        class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500">
                    <button type="submit"
                        class="w-full px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 font-medium">
                        Create Tag
                    </button>
                </form>
            </div>

            <div>
                <h3 class="text-sm font-bold text-slate-700 mb-3">Existing Tags</h3>
                <div id="tagsListContainer" class="space-y-2">
                    <!-- Tags populated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>
