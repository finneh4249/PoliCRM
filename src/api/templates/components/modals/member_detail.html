<div id="memberDetailModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto animate-fade-in">
        <div class="gradient-bg text-white px-6 py-4 flex justify-between items-center rounded-t-2xl">
            <h2 class="text-2xl font-bold" id="detailMemberName">Member Details</h2>
            <button onclick="closeMemberDetail()"
                class="text-white/80 hover:text-white text-2xl leading-none">&times;</button>
        </div>

        <div class="p-6 space-y-6" id="memberDetailContent">
            <!-- Content populated by JS -->
        </div>

        <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-between items-center rounded-b-2xl">
            <button onclick="deleteMemberConfirm()"
                class="px-4 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors border border-red-300">
                🗑️ Delete Member
            </button>
            <div class="flex gap-3">
                <button onclick="closeMemberDetail()"
                    class="px-4 py-2 text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Close</button>
                <button onclick="recheckCurrentMember()"
                    class="px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-colors">
                    🔍 Re-check Enrollment
                </button>
            </div>
        </div>
    </div>
</div>
