version: "3.8"

services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./crm.db:/app/crm.db
      - ./.env:/app/.env
      # Mount the firebase credentials if they exist
      - ./policrm-5f60f-firebase-adminsdk-fbsvc-c4a252e080.json:/app/policrm-5f60f-firebase-adminsdk-fbsvc-c4a252e080.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
